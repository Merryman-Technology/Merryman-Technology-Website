name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: bash scripts/lint-yaml.sh
