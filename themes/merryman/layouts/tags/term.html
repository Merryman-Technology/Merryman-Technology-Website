{{ define "main" }}
<section class="updates-list">
  <div class="updates-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
  <a href="/updates/" class="rss-link tag-back-link">← All updates</a>
  {{ range .Pages }}
  <article class="update-item">
    <h2 class="update-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <div class="update-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      <span class="update-read-time">{{ .ReadingTime }} min read</span>
    </div>
  </article>
  {{ end }}
</section>
{{ end }}
