{{ define "main" }}
<section class="page">
  <h1 class="page-title">Tags</h1>
  <div class="page-content">
    <div class="tag-cloud">
      {{ range .Data.Terms.Alphabetical }}
      <a href="{{ .Page.RelPermalink }}" class="update-tag">{{ .Page.Title }} ({{ .Count }})</a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
