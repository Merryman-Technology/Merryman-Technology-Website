  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  {{ $desc := .Site.Params.tagline }}
  {{ if not .IsHome }}{{ with .Description }}{{ $desc = . }}{{ end }}{{ end }}
  <meta name="description" content="{{ $desc }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ $desc }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if eq .Type "updates" }}article{{ else }}website{{ end }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ $desc }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} Updates" href="{{ "/updates/index.xml" | absURL }}">
  <script defer src="/_vercel/insights/script.js"></script>
