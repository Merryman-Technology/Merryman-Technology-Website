{{ define "main" }}
<section class="updates-list">
  <h1 class="page-title">Updates</h1>
  {{ range .Pages }}
  <article class="update-item">
    <h2 class="update-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    <div class="update-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }}
      <span class="update-tags">{{ range . }}<span class="update-tag">{{ . }}</span>{{ end }}</span>
      {{ end }}
    </div>
  </article>
  {{ end }}
  {{ if not .Pages }}
  <p class="updates-empty">Nothing here yet — check back soon.</p>
  {{ end }}
</section>
{{ end }}
